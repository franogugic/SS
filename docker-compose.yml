services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: sql-injection-presenter-db_v2
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Str0ng_Pass_2026!"
      MSSQL_PID: "Developer"
    ports:
      - "14333:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - sqli-net

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: owasp-zap
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true -config api.disablekey=true
    ports:
      - "8090:8080"
    networks:
      - sqli-net

networks:
  sqli-net:
    driver: bridge

volumes:
  sqlserver-data:
